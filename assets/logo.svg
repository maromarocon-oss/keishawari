<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="けいしゃ割 ロゴ">
  <title>けいしゃ割</title>
  <!-- rounded square background (iOS masks anyway, but this looks clean elsewhere) -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#F4FCF7"/>
  <!-- inner content scaled from the original 38x38 staircase mark, centered with padding -->
  <g transform="translate(52.5,77.25) scale(11)">
    <!-- axes -->
    <line x1="4.5" y1="1" x2="4.5" y2="31.5" stroke="#0E5C32" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="4.5" y1="31.5" x2="37.5" y2="31.5" stroke="#0E5C32" stroke-width="1.2" stroke-linecap="round"/>
    <!-- yen mark -->
    <path d="M 0.5,1.8 L 2.25,4.4 L 4,1.8" stroke="#0E5C32" stroke-width="0.65" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="0.7" y1="5.3" x2="3.8" y2="5.3" stroke="#0E5C32" stroke-width="0.55" stroke-linecap="round"/>
    <line x1="0.7" y1="6.5" x2="3.8" y2="6.5" stroke="#0E5C32" stroke-width="0.55" stroke-linecap="round"/>
    <line x1="2.25" y1="4.4" x2="2.25" y2="8.2" stroke="#0E5C32" stroke-width="0.65" stroke-linecap="round"/>
    <!-- staircase guide -->
    <polyline points="6,25 14.5,25 14.5,18 23,18 23,9" fill="none" stroke="#0E5C32" stroke-width="0.65" stroke-dasharray="1.2,1.2" opacity="0.28"/>
    <!-- GLASS 1 -->
    <path d="M 6.5,25 C 6.5,26.8 8,27.5 8,28.8 C 8,30 7.2,30.5 7.2,31.5 L 12.8,31.5 C 12.8,30.5 12,30 12,28.8 C 12,27.5 13.5,26.8 13.5,25 Z" fill="#2A9055" opacity="0.45"/>
    <path d="M 6,25 C 6,26.8 7.8,27.5 7.8,28.8 C 7.8,30 7,30.5 7,31.5 L 13,31.5 C 13,30.5 12.2,30 12.2,28.8 C 12.2,27.5 14,26.8 14,25 Z" fill="none" stroke="#0E5C32" stroke-width="1.1" stroke-linejoin="round"/>
    <!-- foam 1 -->
    <path d="M 5.5,25 A 2.0 2.0 0 0 1 9.0,23.7 A 2.0 2.0 0 0 1 12.0,23.7 A 2.0 2.0 0 0 1 15.5,25 Z" fill="#F4FCF7" stroke="#0E5C32" stroke-width="0.85" stroke-linejoin="round"/>
    <path d="M 8.3,22.8 A 1.2 1.2 0 0 1 10.5,22.1 A 1.2 1.2 0 0 1 12.7,22.8" fill="none" stroke="#0E5C32" stroke-width="0.7" stroke-linecap="round"/>
    <!-- bubbles 1 -->
    <circle cx="9"  cy="28.5" r="0.55" fill="#0E5C32" opacity="0.3"/>
    <circle cx="11.5" cy="29.8" r="0.45" fill="#0E5C32" opacity="0.25"/>
    <!-- GLASS 2 -->
    <path d="M 15,18 C 15,20.5 16.5,21.8 16.5,23.5 C 16.5,25.5 15.5,27.5 15.5,31.5 L 21.5,31.5 C 21.5,27.5 20.5,25.5 20.5,23.5 C 20.5,21.8 22,20.5 22,18 Z" fill="#2A9055" opacity="0.6"/>
    <path d="M 14.5,18 C 14.5,20.5 16,21.8 16,23.5 C 16,25.5 15,27.5 15,31.5 L 22,31.5 C 22,27.5 21,25.5 21,23.5 C 21,21.8 22.5,20.5 22.5,18 Z" fill="none" stroke="#0E5C32" stroke-width="1.15" stroke-linejoin="round"/>
    <!-- foam 2 -->
    <path d="M 13.0,18 A 2.5 2.5 0 0 1 17.0,16 A 2.5 2.5 0 0 1 20.0,16 A 2.5 2.5 0 0 1 24.0,18 Z" fill="#F4FCF7" stroke="#0E5C32" stroke-width="0.9" stroke-linejoin="round"/>
    <path d="M 14.5,15.3 A 1.5 1.5 0 0 1 17.25,14.47 A 1.5 1.5 0 0 1 20.0,15.3" fill="none" stroke="#0E5C32" stroke-width="0.75" stroke-linecap="round"/>
    <!-- bubbles 2 -->
    <circle cx="16.5" cy="25.5" r="0.6"  fill="#0E5C32" opacity="0.3"/>
    <circle cx="20.2" cy="29.2" r="0.55" fill="#0E5C32" opacity="0.25"/>
    <circle cx="21" cy="22.5" r="0.5" fill="#0E5C32" opacity="0.22"/>
    <!-- GLASS 3 -->
    <path d="M 23.8,9 C 23.8,13.5 25.5,16.5 25.5,20 C 25.5,24 24.5,27 24.5,31.5 L 32.5,31.5 C 32.5,27 31.5,24 31.5,20 C 31.5,16.5 33.2,13.5 33.2,9 Z" fill="#2A9055" opacity="0.82"/>
    <path d="M 23,9 C 23,13.5 25,16.5 25,20 C 25,24 24,27 24,31.5 L 33,31.5 C 33,27 32,24 32,20 C 32,16.5 34,13.5 34,9 Z" fill="none" stroke="#0E5C32" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- foam 3 -->
    <path d="M 23.0,9 A 3.0 3.0 0 0 1 28.0,6.8 A 3.0 3.0 0 0 1 32.0,6.8 A 3.0 3.0 0 0 1 37.0,9 Z" fill="#F4FCF7" stroke="#0E5C32" stroke-width="1.0" stroke-linejoin="round"/>
    <path d="M 24.5,5.7 A 2.0 2.0 0 0 1 28.0,4.38 A 2.0 2.0 0 0 1 31.5,5.7" fill="none" stroke="#0E5C32" stroke-width="0.85" stroke-linecap="round"/>
    <path d="M 26.8,4.1 A 1.2 1.2 0 0 1 29.2,4.1" fill="none" stroke="#0E5C32" stroke-width="0.7" stroke-linecap="round"/>
    <!-- bubbles 3 -->
    <circle cx="26.5" cy="19"   r="0.8"  fill="white" opacity="0.5"/>
    <circle cx="30"   cy="24.5" r="0.75" fill="white" opacity="0.45"/>
    <circle cx="27.5" cy="28"   r="0.7"  fill="white" opacity="0.4"/>
    <circle cx="31.5" cy="15"   r="0.65" fill="white" opacity="0.38"/>
