<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="飲みすぎ注意のイラスト">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFEFEF"/><stop offset="1" stop-color="#F4FCF7"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg5)"/>
  <rect x="0" y="0" width="640" height="64" fill="#2A9055"/>
  <text x="32" y="42" font-family="'Hiragino Sans',sans-serif" font-size="26" font-weight="900" fill="#fff">飲みすぎ注意報</text>
  <text x="32" y="100" font-family="'Hiragino Sans',sans-serif" font-size="18" font-weight="700" fill="#1F7040">記憶をなくす前に守る5つのこと。</text>
  <!-- glass with water -->
  <g transform="translate(90,140)">
    <path d="M10 10 H110 L96 150 H24 Z" fill="#CDE8FF" stroke="#0E5C32" stroke-width="3" stroke-linejoin="round"/>
    <path d="M16 60 H104 L96 150 H24 Z" fill="#9FD0FB"/>
    <text x="60" y="185" text-anchor="middle" font-family="'Hiragino Sans',sans-serif" font-size="14" font-weight="800" fill="#1F7040">水・ソフトを挟む</text>
  </g>
  <!-- caution circle -->
  <g transform="translate(330,140)">
    <circle cx="80" cy="80" r="72" fill="#fff" stroke="#D9534F" stroke-width="8"/>
    <rect x="72" y="32" width="16" height="64" rx="8" fill="#D9534F"/>
    <circle cx="80" cy="116" r="11" fill="#D9534F"/>
    <text x="80" y="180" text-anchor="middle" font-family="'Hiragino Sans',sans-serif" font-size="14" font-weight="800" fill="#B5403C">ペース配分を忘れずに</text>
  </g>
</svg>
