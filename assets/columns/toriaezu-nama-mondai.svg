<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="「とりあえず生」問題のイラスト">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAFAF1"/><stop offset="1" stop-color="#F4FCF7"/>
    </linearGradient>
    <linearGradient id="beer1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD24D"/><stop offset="1" stop-color="#F2A93B"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg1)"/>
  <rect x="0" y="0" width="640" height="64" fill="#2A9055"/>
  <text x="32" y="42" font-family="'Hiragino Sans',sans-serif" font-size="26" font-weight="900" fill="#fff">「とりあえず生」問題</text>
  <text x="32" y="100" font-family="'Hiragino Sans',sans-serif" font-size="18" font-weight="700" fill="#1F7040">最初の注文、もう迷わない。</text>
  <!-- mugs -->
  <g transform="translate(70,140)">
    <g transform="translate(0,0)">
      <rect x="0" y="40" width="86" height="120" rx="10" fill="url(#beer1)" stroke="#0E5C32" stroke-width="3"/>
      <rect x="0" y="20" width="86" height="34" rx="14" fill="#FFFBEF" stroke="#0E5C32" stroke-width="3"/>
      <path d="M86 70 q40 6 40 40 q0 34 -40 40" fill="none" stroke="#0E5C32" stroke-width="3"/>
      <circle cx="22" cy="14" r="9" fill="#FFFBEF" stroke="#0E5C32" stroke-width="2"/>
      <circle cx="46" cy="8" r="11" fill="#FFFBEF" stroke="#0E5C32" stroke-width="2"/>
      <circle cx="68" cy="16" r="8" fill="#FFFBEF" stroke="#0E5C32" stroke-width="2"/>
    </g>
    <g transform="translate(150,30)">
      <rect x="0" y="40" width="86" height="120" rx="10" fill="url(#beer1)" stroke="#0E5C32" stroke-width="3"/>
      <rect x="0" y="20" width="86" height="34" rx="14" fill="#FFFBEF" stroke="#0E5C32" stroke-width="3"/>
      <path d="M86 70 q40 6 40 40 q0 34 -40 40" fill="none" stroke="#0E5C32" stroke-width="3"/>
      <circle cx="22" cy="14" r="9" fill="#FFFBEF" stroke="#0E5C32" stroke-width="2"/>
      <circle cx="46" cy="8" r="11" fill="#FFFBEF" stroke="#0E5C32" stroke-width="2"/>
      <circle cx="68" cy="16" r="8" fill="#FFFBEF" stroke="#0E5C32" stroke-width="2"/>
    </g>
  </g>
  <!-- speech bubble -->
  <g transform="translate(380,150)">
    <rect x="0" y="0" width="220" height="80" rx="18" fill="#fff" stroke="#2A9055" stroke-width="3"/>
    <path d="M30 80 l0 26 l26 -26 z" fill="#fff" stroke="#2A9055" stroke-width="3"/>
    <text x="110" y="38" text-anchor="middle" font-family="'Hiragino Sans',sans-serif" font-size="22" font-weight="900" fill="#1F7040">とりあえず</text>
    <text x="110" y="64" text-anchor="middle" font-family="'Hiragino Sans',sans-serif" font-size="22" font-weight="900" fill="#1F7040">生で！</text>
  </g>
</svg>
