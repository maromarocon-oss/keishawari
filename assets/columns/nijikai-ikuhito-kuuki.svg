<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="二次会「行く人？」で空気が凍るのイラスト">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8F4FB"/><stop offset="1" stop-color="#F4FCF7"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg3)"/>
  <rect x="0" y="0" width="640" height="64" fill="#2A9055"/>
  <text x="32" y="42" font-family="'Hiragino Sans',sans-serif" font-size="25" font-weight="900" fill="#fff">二次会「行く人？」問題</text>
  <text x="32" y="100" font-family="'Hiragino Sans',sans-serif" font-size="18" font-weight="700" fill="#1F7040">空気が凍る、あの瞬間。</text>
  <!-- snowflakes -->
  <g stroke="#7FB7DC" stroke-width="2.5" stroke-linecap="round">
    <g transform="translate(120,150)"><line x1="-14" y1="0" x2="14" y2="0"/><line x1="0" y1="-14" x2="0" y2="14"/><line x1="-10" y1="-10" x2="10" y2="10"/><line x1="-10" y1="10" x2="10" y2="-10"/></g>
    <g transform="translate(520,140)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/><line x1="-8" y1="-8" x2="8" y2="8"/><line x1="-8" y1="8" x2="8" y2="-8"/></g>
    <g transform="translate(470,260)"><line x1="-10" y1="0" x2="10" y2="0"/><line x1="0" y1="-10" x2="0" y2="10"/><line x1="-7" y1="-7" x2="7" y2="7"/><line x1="-7" y1="7" x2="7" y2="-7"/></g>
  </g>
  <!-- bubble -->
  <g transform="translate(180,140)">
    <rect x="0" y="0" width="280" height="74" rx="18" fill="#fff" stroke="#2A9055" stroke-width="3"/>
    <path d="M40 74 l0 26 l26 -26 z" fill="#fff" stroke="#2A9055" stroke-width="3"/>
    <text x="140" y="46" text-anchor="middle" font-family="'Hiragino Sans',sans-serif" font-size="22" font-weight="900" fill="#1F7040">二次会、行く人ー？</text>
  </g>
  <!-- silent dots -->
  <g transform="translate(300,250)">
    <circle cx="0" cy="0" r="8" fill="#9A8880"/>
    <circle cx="26" cy="0" r="8" fill="#9A8880"/>
    <circle cx="52" cy="0" r="8" fill="#9A8880"/>
  </g>
</svg>
