<div id="s2" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="goBackToSetup()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>戻る
    </button>
    <span class="step-badge">STEP 2 / 3</span>
  </div>
  <div class="stepper">
    <div class="step-item">
      <div class="step-circle done"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="step-text"><span class="step-num-lbl">STEP 1</span><span class="step-name done">グループ設定</span></div>
    </div>
    <div class="step-connector done"></div>
    <div class="step-item">
      <div class="step-circle active">2</div>
      <div class="step-text"><span class="step-num-lbl">STEP 2</span><span class="step-name active">支払入力</span></div>
    </div>
    <div class="step-connector"></div>
    <div class="step-item">
      <div class="step-circle">3</div>
      <div class="step-text"><span class="step-num-lbl">STEP 3</span><span class="step-name">精算結果</span></div>
    </div>
  </div>
  <div class="screen-body" style="padding-top:20px">
    <div class="section-title" id="s2-title">支払を入力</div>
    <div class="section-sub">「傾斜入力」タブでは、グループごとに1人あたりの金額を設定できます。</div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-easy" onclick="switchTab('easy')">かんたん入力</button>
      <button class="tab-btn" id="tab-keisha" onclick="switchTab('keisha')">傾斜入力</button>
    </div>
    <div class="form-card" id="form-card"></div>
    <div class="divider-lbl">登録済みの支払</div>
    <div id="payment-list"><div class="no-payments">まだ登録されていません</div></div>
  </div>
  <div class="btn-fixed"><div class="btn-inner">
    <button class="primary-btn" onclick="goToResults()">
      精算金額を計算する
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div></div>
</div>
