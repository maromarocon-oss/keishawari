[build]
  publish = "."

# clean URLs: /privacy → /privacy.html, etc.
[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/guide"
  to   = "/guide.html"
  status = 200

[[redirects]]
  from = "/column"
  to   = "/column.html"
  status = 200

[[redirects]]
  from = "/column/keishawari-review"
  to   = "/column/keishawari-review.html"
  status = 200

[[redirects]]
  from = "/app"
  to   = "/app/"
  status = 301

[[redirects]]
  from = "/guide/keisha-hiritsu"
  to   = "/guide/keisha-hiritsu.html"
  status = 200

[[redirects]]
  from = "/guide/kansougeikai"
  to   = "/guide/kansougeikai.html"
  status = 200

[[redirects]]
  from = "/guide/bonenkai"
  to   = "/guide/bonenkai.html"
  status = 200

[[redirects]]
  from = "/guide/warikan-hasuu"
  to   = "/guide/warikan-hasuu.html"
  status = 200

[[redirects]]
  from = "/guide/paypay-line-soukin"
  to   = "/guide/paypay-line-soukin.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://*.googlesyndication.com; font-src 'self' https://*.gstatic.com; script-src 'self' 'unsafe-inline' https://*.googlesyndication.com https://*.google.com https://*.gstatic.com https://*.doubleclick.net; connect-src 'self' https://*.googlesyndication.com https://*.google.com https://*.doubleclick.net; img-src 'self' data: https://*.googlesyndication.com https://*.google.com https://*.gstatic.com https://*.doubleclick.net; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; frame-src https://*.googlesyndication.com https://*.google.com https://*.doubleclick.net; worker-src 'none'; manifest-src 'self'; media-src 'none'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
